[workspace]
resolver = "2"
default-members = ["apps/aura-gallery"]
members = [
    "crates/aura-core",
    "crates/aura-theme",
    "crates/aura-components",
    "crates/aura-tray",
    "crates/aura-packager",
    "xtask",
    "crates/aura-icons",
    "crates/aura-icons-lucide",
    "apps/aura-gallery",
    "apps/aura-docs",
]

[workspace.dependencies]
gpui = { git = "https://github.com/zed-industries/zed", default-features = false }
gpui_platform = { git = "https://github.com/zed-industries/zed", default-features = false }
