[package]
name = "liora-native-demo"
version = "0.1.0"
edition = "2024"

[dependencies]
# Official Zed GPUI crate. Do not use non-official forks.
gpui = { version = "0.2", default-features = false }

# Use the facade crate for application development.
liora = { version = "0.1" }

[target.'cfg(any(target_os = "linux", target_os = "freebsd"))'.dependencies]
gpui = { version = "0.2", default-features = false, features = ["wayland", "x11", "font-kit"] }

[target.'cfg(target_os = "macos")'.dependencies]
gpui = { version = "0.2", default-features = false, features = ["font-kit"] }

[target.'cfg(target_os = "windows")'.dependencies]
gpui = { version = "0.2", default-features = false }
