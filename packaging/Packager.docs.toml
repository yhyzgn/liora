# Liora Docs packager metadata.
# Consumed by future `cargo-packager` integration through `cargo xtask package`.

[application]
id = "dev.liora.Docs"
name = "Liora Docs"
binary = "liora-docs"
package = "liora-docs"
category = "Documentation"
