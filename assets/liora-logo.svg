      <stop offset="0.54" stop-color="#93C5FD" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#0F172A" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="lift" x="52" y="42" width="408" height="428" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#020617" flood-opacity="0.24"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#E0F2FE" flood-opacity="0.22"/>
