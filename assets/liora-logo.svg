<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Liora modular native UI mark</title>
  <desc id="desc">A symbol-only modular app tile mark for the Liora pure Rust and GPUI native UI component library.</desc>
  <defs>
    <linearGradient id="tile" x1="116" y1="78" x2="406" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.52" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="rim" x1="102" y1="70" x2="416" y2="438" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E2E8F0" stop-opacity="0.88"/>
      <stop offset="0.45" stop-color="#7DD3FC" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#334155" stop-opacity="0.62"/>
    </linearGradient>
    <linearGradient id="panel" x1="168" y1="144" x2="344" y2="366" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.48" stop-color="#DDF7FF"/>
      <stop offset="1" stop-color="#8BA4C2"/>
    </linearGradient>
    <linearGradient id="cyan" x1="144" y1="136" x2="378" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="mint" x1="178" y1="300" x2="344" y2="398" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A7F3D0"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="shadow" x="44" y="40" width="424" height="428" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#020617" flood-opacity="0.26"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#E0F2FE" flood-opacity="0.18"/>
    </filter>
    <filter id="line-glow" x="98" y="86" width="316" height="324" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.15 0 0 0 0 0.76 0 0 0 0 0.92 0 0 0 0.42 0"/>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#F8FAFC"/>
  <rect x="32" y="32" width="448" height="448" rx="94" fill="#E2E8F0" opacity="0.42"/>
  <circle cx="382" cy="136" r="92" fill="#CFFAFE" opacity="0.34"/>
  <circle cx="126" cy="390" r="104" fill="#CBD5E1" opacity="0.32"/>

  <g filter="url(#shadow)">
    <rect x="96" y="86" width="320" height="336" rx="80" fill="url(#tile)"/>
    <rect x="102" y="92" width="308" height="324" rx="74" stroke="url(#rim)" stroke-width="4"/>
    <rect x="128" y="120" width="256" height="272" rx="54" fill="#0F172A" stroke="#E2E8F0" stroke-opacity="0.10" stroke-width="2"/>

    <g filter="url(#line-glow)">
      <path d="M152 186C188 146 230 126 278 126C318 126 354 140.8 386 170.4" stroke="url(#cyan)" stroke-width="3" stroke-linecap="round" opacity="0.76"/>
      <path d="M126 314C168 270 214.2 250.5 264.5 255.5C313 260.3 354.2 286.2 388 333" stroke="#67E8F9" stroke-width="2" stroke-linecap="round" opacity="0.28"/>
      <path d="M178 386C214 350 252.2 333.8 292.6 337.3C328 340.4 358.4 356 384 384" stroke="#A7F3D0" stroke-width="2" stroke-linecap="round" opacity="0.24"/>
    </g>

    <rect x="154" y="148" width="92" height="92" rx="26" fill="url(#panel)"/>
    <rect x="266" y="148" width="92" height="92" rx="26" fill="#1E293B" stroke="#E2E8F0" stroke-opacity="0.18" stroke-width="2"/>
    <rect x="154" y="260" width="92" height="92" rx="26" fill="#1E293B" stroke="#E2E8F0" stroke-opacity="0.18" stroke-width="2"/>
    <rect x="266" y="260" width="92" height="92" rx="26" fill="url(#mint)"/>

    <rect x="178" y="174" width="44" height="8" rx="4" fill="#0F172A" opacity="0.72"/>
    <rect x="178" y="194" width="28" height="8" rx="4" fill="#0F172A" opacity="0.38"/>
    <circle cx="312" cy="194" r="23" stroke="#7DD3FC" stroke-opacity="0.78" stroke-width="7"/>
    <path d="M294 306L311 288L330 325L346 306" stroke="#F8FAFC" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <path d="M178 292H222M178 312H208M178 332H218" stroke="#CBD5E1" stroke-opacity="0.72" stroke-width="8" stroke-linecap="round"/>

    <circle cx="256" cy="254" r="14" fill="#F8FAFC" stroke="#0F172A" stroke-opacity="0.18" stroke-width="3"/>
    <path d="M246 254H128" stroke="#E2E8F0" stroke-opacity="0.10" stroke-width="2"/>
    <path d="M384 254H266" stroke="#E2E8F0" stroke-opacity="0.10" stroke-width="2"/>
    <path d="M256 244V120" stroke="#E2E8F0" stroke-opacity="0.10" stroke-width="2"/>
    <path d="M256 392V264" stroke="#E2E8F0" stroke-opacity="0.10" stroke-width="2"/>
  </g>
</svg>
