    </radialGradient>
    <linearGradient id="graphite" x1="98" y1="70" x2="414" y2="442" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#334155"/>
      <stop offset="0.48" stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="glass-a" x1="154" y1="126" x2="370" y2="366" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FDFF"/>
      <stop offset="0.38" stop-color="#B8EEF7"/>
      <stop offset="0.74" stop-color="#6F8BA8"/>
      <stop offset="1" stop-color="#2B3650"/>
    </linearGradient>
    <linearGradient id="glass-b" x1="332" y1="138" x2="170" y2="392" gradientUnits="userSpaceOnUse">
