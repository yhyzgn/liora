<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Liora abstract native UI mark</title>
  <desc id="desc">A symbol-only graphite and glacier glass mark for the Liora pure Rust and GPUI native UI component library.</desc>
  <defs>
