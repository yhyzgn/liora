name: Package native Aura apps

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only generate backend configs and print commands"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      app:
        description: "App to package"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - gallery
          - docs
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: ${{ matrix.os }} native packages
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
          - os: macos-14
            platform: macos
          - os: windows-2022
            platform: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Prefer toolchain cargo shim
        shell: bash
        run: |
          set -euo pipefail
          echo "$(dirname "$(rustup which cargo)")" >> "$GITHUB_PATH"

      - name: Configure package channel
        id: package-channel
        shell: bash
        run: |
          set -euo pipefail
          base_version="$(sed -n 's/^version = "\(.*\)"/\1/p' crates/aura-packager/Cargo.toml | head -n 1)"
          if [[ -z "${base_version}" ]]; then
            echo "Failed to read base package version from crates/aura-packager/Cargo.toml" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            channel="release"
            version="${GITHUB_REF_NAME#v}"
          else
            channel="preview"
            short_sha="${GITHUB_SHA::7}"
            version="${base_version}-preview.${GITHUB_RUN_NUMBER}.${short_sha}"
          fi

          echo "AURA_PACKAGE_CHANNEL=${channel}" >> "${GITHUB_ENV}"
          echo "AURA_PACKAGE_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "channel=${channel}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Packaging ${channel} build as version ${version}"

      - name: Install Linux packaging prerequisites
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libasound2-dev \
            libatk1.0-dev \
            libayatana-appindicator3-dev \
            libcairo2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgdk-pixbuf-2.0-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libpango1.0-dev \
            librsvg2-dev \
            libvulkan-dev \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            pkg-config \
            rpm \
            zsync

      - name: Install Linux package backends
        if: matrix.platform == 'linux'
        run: |
          cargo install cargo-packager --locked
          cargo install cargo-generate-rpm --locked

      - name: Install macOS package backend
        if: matrix.platform == 'macos'
        run: cargo install cargo-packager --locked

      - name: Install Windows package backend
        if: matrix.platform == 'windows'
        shell: pwsh
        run: cargo install cargo-packager --locked

      - name: Validate packaging metadata
        run: cargo run -p xtask -- package validate

      - name: Test packager domain logic
        run: cargo test -p aura-packager

      - name: Build raw runnable binaries
        if: github.event.inputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          APP_INPUT="${{ github.event.inputs.app || 'all' }}"
          args=(cargo run -p xtask -- package build)
          if [[ "$APP_INPUT" == "all" ]]; then
            args+=(--all-apps)
          else
            args+=(--app "$APP_INPUT")
          fi
          "${args[@]}"

      - name: Stage raw runnable binaries
        if: github.event.inputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          APP_INPUT="${{ github.event.inputs.app || 'all' }}"
          platform="${{ matrix.platform }}"
          version="${{ steps.package-channel.outputs.version }}"
          ext=""
          if [[ "$platform" == "windows" ]]; then
            ext=".exe"
          fi

          if [[ "$APP_INPUT" == "all" ]]; then
            apps=(aura-gallery aura-docs)
          elif [[ "$APP_INPUT" == "gallery" ]]; then
            apps=(aura-gallery)
          else
            apps=(aura-docs)
          fi

          out_root="target/aura-raw-binaries"
          rm -rf "$out_root"
          mkdir -p "$out_root"
          checksum_file="$out_root/checksums.txt"
          : > "$checksum_file"

          sha256() {
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$1" | awk '{print $1}'
            else
              shasum -a 256 "$1" | awk '{print $1}'
            fi
          }

          for app in "${apps[@]}"; do
            src="target/release/${app}${ext}"
            if [[ ! -f "$src" ]]; then
              echo "missing raw runnable binary: $src" >&2
              exit 1
            fi
            dest_dir="$out_root/$app/$platform"
            mkdir -p "$dest_dir"
            dest="$dest_dir/${app}${ext}"
            cp "$src" "$dest"
            digest="$(sha256 "$dest")"
            rel="${dest#${out_root}/}"
            printf '%s  %s\n' "$digest" "$rel" >> "$checksum_file"
          done

          cat > "$out_root/README.md" <<EOF
          # Aura raw runnable binaries

          Version: \`$version\`
          Platform: \`$platform\`

          These are the original release-mode executables built before installer packaging.
          They are uploaded for Aura's own release verification and smoke-test workflow; downstream Aura component-library users do not need to publish raw binaries unless their product release policy requires it.
          EOF
          sed -i.bak 's/^          //' "$out_root/README.md" && rm "$out_root/README.md.bak"

      - name: Build package command
        id: package-command
        shell: bash
        run: |
          set -euo pipefail
          APP_INPUT="${{ github.event.inputs.app || 'all' }}"
          DRY_INPUT="${{ github.event.inputs.dry_run || 'false' }}"
          format="platform-defaults"
          if [[ "${{ matrix.platform }}" == "windows" && "${{ steps.package-channel.outputs.channel }}" == "preview" && "$DRY_INPUT" != "true" ]]; then
            # MSI requires a numeric-only Windows Installer version. Keep push previews real by
            # building the NSIS package; tagged release builds still use the full Windows default set.
            format="nsis"
          fi
          args=(cargo run -p xtask -- package ci --format "$format")
          if [[ "$APP_INPUT" == "all" ]]; then
            args+=(--all-apps)
          else
            args+=(--app "$APP_INPUT")
          fi
          args+=(--skip-build)
          if [[ "$DRY_INPUT" == "true" ]]; then
            args+=(--dry-run)
          fi
          printf 'command=' >> "$GITHUB_OUTPUT"
          printf '%q ' "${args[@]}" >> "$GITHUB_OUTPUT"
          printf '\n' >> "$GITHUB_OUTPUT"

      - name: Package Aura apps
        shell: bash
        run: ${{ steps.package-command.outputs.command }}

      - name: Smoke package artifacts
        if: github.event.inputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          APP_INPUT="${{ github.event.inputs.app || 'all' }}"
          format="platform-defaults"
          if [[ "${{ matrix.platform }}" == "windows" && "${{ steps.package-channel.outputs.channel }}" == "preview" ]]; then
            format="nsis"
          fi
          args=(cargo run -p xtask -- package smoke --format "$format")
          if [[ "$APP_INPUT" == "all" ]]; then
            args+=(--all-apps)
          else
            args+=(--app "$APP_INPUT")
          fi
          "${args[@]}"

      - name: Plan install and uninstall smoke
        if: github.event.inputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          APP_INPUT="${{ github.event.inputs.app || 'all' }}"
          format="platform-defaults"
          if [[ "${{ matrix.platform }}" == "windows" && "${{ steps.package-channel.outputs.channel }}" == "preview" ]]; then
            format="nsis"
          fi
          args=(cargo run -p xtask -- package install-smoke --format "$format")
          if [[ "$APP_INPUT" == "all" ]]; then
            args+=(--all-apps)
          else
            args+=(--app "$APP_INPUT")
          fi
          "${args[@]}"

      - name: Upload raw runnable binaries
        if: github.event.inputs.dry_run != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: aura-${{ steps.package-channel.outputs.channel }}-binaries-${{ matrix.platform }}
          path: target/aura-raw-binaries/**
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 90 || 14 }}

      - name: Upload package artifacts
        if: github.event.inputs.dry_run != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: aura-${{ steps.package-channel.outputs.channel }}-packages-${{ matrix.platform }}
          path: |
            target/packages/**
            target/aura-packager/*.toml
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 90 || 14 }}

  release:
    name: Publish GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: aura-release-packages-*
          path: dist
          merge-multiple: false

      - name: Download raw runnable binaries
        uses: actions/download-artifact@v8
        with:
          pattern: aura-release-binaries-*
          path: dist
          merge-multiple: false

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release-assets
          mkdir -p release-assets
          while IFS= read -r artifact; do
            rel="${artifact#dist/}"
            safe="${rel//\//__}"
            cp "$artifact" "release-assets/$safe"
          done < <(find dist -type f | sort)

      - name: Build release notes and changelog
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          git fetch --tags --force
          previous_tag="$(git tag --sort=-v:refname | grep -v "^${tag}$" | head -n 1 || true)"

          changelog_input="changelog.tsv"
          if [[ -n "${previous_tag}" ]]; then
            git log --pretty=format:'%s%x09%h' "${previous_tag}..${tag}" > "${changelog_input}" || true
          else
            git log --pretty=format:'%s%x09%h' "${tag}" --max-count=100 > "${changelog_input}" || true
          fi

          emit_grouped_changelog() {
            local input="$1"
            local found_any="false"
            local wanted line subject sha type scope title
            local conventional_commit_pattern='^([A-Za-z]+)(\(([^)]*)\))?(!)?:[[:space:]]*(.*)$'
            local order=(feat fix docs ci build refactor perf test style chore revert other)
            declare -A headings=(
              [feat]="Features"
              [fix]="Fixes"
              [docs]="Documentation"
              [ci]="CI"
              [build]="Build"
              [refactor]="Refactoring"
              [perf]="Performance"
              [test]="Tests"
              [style]="Style"
              [chore]="Chores"
              [revert]="Reverts"
              [other]="Other"
            )

            for wanted in "${order[@]}"; do
              local lines=()
              while IFS=$'\t' read -r subject sha; do
                [[ -z "${subject}" ]] && continue
                type="other"
                scope=""
                title="${subject}"

                if [[ "${subject}" =~ ${conventional_commit_pattern} ]]; then
                  type="${BASH_REMATCH[1],,}"
                  scope="${BASH_REMATCH[3]}"
                  title="${BASH_REMATCH[5]}"
                fi

                case "${type}" in
                  feature|features) type="feat" ;;
                  fixes) type="fix" ;;
                  doc) type="docs" ;;
                  tests) type="test" ;;
                esac

                case "${type}" in
                  feat|fix|docs|ci|build|refactor|perf|test|style|chore|revert) ;;
                  *) type="other" ;;
                esac

                if [[ "${type}" == "${wanted}" ]]; then
                  if [[ -n "${scope}" ]]; then
                    lines+=("- **${scope}:** ${title} (\`${sha}\`)")
                  else
                    lines+=("- ${title} (\`${sha}\`)")
                  fi
                fi
              done < "${input}"

              if [[ ${#lines[@]} -gt 0 ]]; then
                found_any="true"
                echo "### ${headings[$wanted]}"
                printf '%s\n' "${lines[@]}"
                echo
              fi
            done

            if [[ "${found_any}" == "false" ]]; then
              echo "_No commits found._"
              echo
            fi
          }

          {
            echo "# Aura ${tag}"
            echo
            echo "## Changelog"
            echo
            if [[ -n "${previous_tag}" ]]; then
              echo "Changes since \`${previous_tag}\`:"
            else
              echo "No previous tag found. Listing up to 100 commits reachable from this tag:"
            fi
            echo
            emit_grouped_changelog "${changelog_input}"
            echo "## Installer and package artifacts"
            echo
            if find release-assets -type f | grep -q 'aura-release-packages-'; then
              find release-assets -type f | grep 'aura-release-packages-' | sort | while read -r artifact; do
                size="$(du -h "$artifact" | cut -f1)"
                echo "- \`${artifact#release-assets/}\` (${size})"
              done
            else
              echo "No package artifacts were downloaded."
            fi
            echo
            echo "## Raw runnable binaries"
            echo
            echo "These release assets are Aura-project convenience outputs: they are the original release-mode executables built before installer packaging for smoke tests and direct debugging. Downstream projects using Aura as a component library do not need to publish raw binaries unless their own release policy requires it."
            echo
            if find release-assets -type f | grep -q 'aura-release-binaries-'; then
              find release-assets -type f | grep 'aura-release-binaries-' | sort | while read -r artifact; do
                size="$(du -h "$artifact" | cut -f1)"
                echo "- \`${artifact#release-assets/}\` (${size})"
              done
            else
              echo "No raw runnable binaries were downloaded."
            fi
            echo
            echo "## Integrity"
            echo
            echo "Package artifact bundles include generated \`checksums.txt\` and \`package-manifest.json\` files when package outputs were discovered. Raw binary bundles include a separate \`checksums.txt\` for the staged executables."
          } > release-notes.md

          cat release-notes.md
          cp release-notes.md release-assets/release-notes.md

      - name: Publish release and upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mapfile -t files < <(find release-assets -type f | sort)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No files found under dist; refusing to publish an empty release." >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "Aura ${tag}" \
              --notes-file release-notes.md
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" \
              --title "Aura ${tag}" \
              --notes-file release-notes.md
          fi

