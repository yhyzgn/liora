name: Package native Aura apps

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only generate backend configs and print commands"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      app:
        description: "App to package"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - gallery
          - docs
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: ${{ matrix.os }} native packages
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
          - os: macos-14
            platform: macos
          - os: windows-2022
            platform: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux packaging prerequisites
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libasound2-dev \
            libatk1.0-dev \
            libayatana-appindicator3-dev \
            libcairo2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgdk-pixbuf-2.0-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libpango1.0-dev \
            librsvg2-dev \
            libvulkan-dev \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev \
            pkg-config \
            rpm \
            zsync

      - name: Install Linux package backends
        if: matrix.platform == 'linux'
        run: |
          cargo install cargo-packager --locked
          cargo install cargo-generate-rpm --locked

      - name: Install macOS package backend
        if: matrix.platform == 'macos'
        run: cargo install cargo-packager --locked

      - name: Install Windows package backend
        if: matrix.platform == 'windows'
        shell: pwsh
        run: cargo install cargo-packager --locked

      - name: Validate packaging metadata
        run: cargo xtask package validate

      - name: Test packager domain logic
        run: cargo test -p aura-packager

      - name: Build package command
        id: package-command
        shell: bash
        run: |
          set -euo pipefail
          APP_INPUT="${{ github.event.inputs.app || 'all' }}"
          DRY_INPUT="${{ github.event.inputs.dry_run || 'false' }}"
          args=(cargo xtask package ci --format platform-defaults)
          if [[ "$APP_INPUT" == "all" ]]; then
            args+=(--all-apps)
          else
            args+=(--app "$APP_INPUT")
          fi
          if [[ "$DRY_INPUT" == "true" ]]; then
            args+=(--dry-run --skip-build)
          fi
          printf 'command=' >> "$GITHUB_OUTPUT"
          printf '%q ' "${args[@]}" >> "$GITHUB_OUTPUT"
          printf '\n' >> "$GITHUB_OUTPUT"

      - name: Package Aura apps
        shell: bash
        run: ${{ steps.package-command.outputs.command }}

      - name: Upload package artifacts
        if: github.event.inputs.dry_run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: aura-packages-${{ matrix.platform }}
          path: |
            target/packages/**
            target/aura-packager/*.toml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: aura-packages-*
          path: dist
          merge-multiple: false

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release-assets
          mkdir -p release-assets
          while IFS= read -r artifact; do
            rel="${artifact#dist/}"
            safe="${rel//\//__}"
            cp "$artifact" "release-assets/$safe"
          done < <(find dist -type f | sort)

      - name: Build release notes and changelog
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          git fetch --tags --force
          previous_tag="$(git tag --sort=-v:refname | grep -v "^${tag}$" | head -n 1 || true)"

          {
            echo "# Aura ${tag}"
            echo
            echo "## Changelog"
            echo
            if [[ -n "${previous_tag}" ]]; then
              echo "Changes since \`${previous_tag}\`:"
              echo
              git log --pretty=format:'- %s (`%h`)' "${previous_tag}..${tag}" || true
              echo
            else
              echo "No previous tag found. Listing commits reachable from this tag:"
              echo
              git log --pretty=format:'- %s (`%h`)' "${tag}" --max-count=100 || true
              echo
            fi
            echo
            echo "## Package artifacts"
            echo
            if find release-assets -type f | grep -q .; then
              find release-assets -type f | sort | while read -r artifact; do
                size="$(du -h "$artifact" | cut -f1)"
                echo "- \`${artifact#release-assets/}\` (${size})"
              done
            else
              echo "No package artifacts were downloaded."
            fi
            echo
            echo "## Integrity"
            echo
            echo "Each platform artifact bundle includes generated \`checksums.txt\` and \`package-manifest.json\` files when package outputs were discovered."
          } > release-notes.md

          cat release-notes.md
          cp release-notes.md release-assets/release-notes.md

      - name: Publish release and upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mapfile -t files < <(find release-assets -type f | sort)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No files found under dist; refusing to publish an empty release." >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "Aura ${tag}" \
              --notes-file release-notes.md
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" \
              --title "Aura ${tag}" \
              --notes-file release-notes.md
          fi

