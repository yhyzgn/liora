name: Package native Liora apps

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only generate backend configs and print commands"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      app:
        description: "Raw executable target; installer packaging is gallery-only"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - gallery
          - docs
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: ${{ matrix.os }} native packages
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
          - os: macos-14
            platform: macos
          - os: windows-2022
            platform: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Prefer toolchain cargo shim
        shell: bash
        run: |
          set -euo pipefail
          echo "$(dirname "$(rustup which cargo)")" >> "$GITHUB_PATH"

      - name: Configure package channel
        id: package-channel
        shell: bash
        run: |
          set -euo pipefail
          base_version="$(sed -n 's/^version = "\(.*\)"/\1/p' crates/liora-packager/Cargo.toml | head -n 1)"
          if [[ -z "${base_version}" ]]; then
            echo "Failed to read base package version from crates/liora-packager/Cargo.toml" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            channel="release"
            version="${GITHUB_REF_NAME#v}"
            if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Release tags must use vX.Y.Z so every backend, including Windows MSI, receives a numeric package version. Got: ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
            if [[ "${version}" != "${base_version}" ]]; then
              echo "Release tag ${GITHUB_REF_NAME} does not match crates/liora-packager version ${base_version}. Bump the package version or retag before releasing." >&2
              exit 1
            fi
          else
            channel="preview"
            short_sha="${GITHUB_SHA::7}"
            version="${base_version}-preview.${GITHUB_RUN_NUMBER}.${short_sha}"
          fi

          echo "LIORA_PACKAGE_CHANNEL=${channel}" >> "${GITHUB_ENV}"
          echo "LIORA_PACKAGE_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "channel=${channel}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Packaging ${channel} build as version ${version}"

      - name: Install Linux packaging prerequisites
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libasound2-dev \
            libatk1.0-dev \
            libayatana-appindicator3-dev \
            libcairo2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgdk-pixbuf-2.0-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libpango1.0-dev \
            librsvg2-dev \
            libvulkan-dev \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            pkg-config \
            rpm \
            zsync

      - name: Install Linux package backends
        if: matrix.platform == 'linux'
        run: |
          cargo install cargo-packager --locked
          cargo install cargo-generate-rpm --locked

      - name: Install macOS package backend
        if: matrix.platform == 'macos'
        run: cargo install cargo-packager --locked

      - name: Install Windows package backend
        if: matrix.platform == 'windows'
        shell: pwsh
        run: cargo install cargo-packager --locked

      - name: Validate packaging metadata
        run: cargo run -p xtask -- package validate

      - name: Check release readiness policy
        env:
          LIORA_REQUIRE_SIGNING: ${{ vars.LIORA_REQUIRE_SIGNING == 'true' && 'true' || 'false' }}
          LIORA_MACOS_CODESIGN_IDENTITY: ${{ secrets.LIORA_MACOS_CODESIGN_IDENTITY }}
          LIORA_MACOS_NOTARY_APPLE_ID: ${{ secrets.LIORA_MACOS_NOTARY_APPLE_ID }}
          LIORA_MACOS_NOTARY_TEAM_ID: ${{ secrets.LIORA_MACOS_NOTARY_TEAM_ID }}
          LIORA_MACOS_NOTARY_PASSWORD: ${{ secrets.LIORA_MACOS_NOTARY_PASSWORD }}
          LIORA_WINDOWS_SIGNTOOL_CERT_PATH: ${{ secrets.LIORA_WINDOWS_SIGNTOOL_CERT_PATH }}
          LIORA_WINDOWS_SIGNTOOL_CERT_PASSWORD: ${{ secrets.LIORA_WINDOWS_SIGNTOOL_CERT_PASSWORD }}
          LIORA_WINDOWS_TIMESTAMP_URL: ${{ secrets.LIORA_WINDOWS_TIMESTAMP_URL }}
        run: cargo run -p xtask -- package release-readiness

      - name: Test packager domain logic
        run: cargo test -p liora-packager

      - name: Build raw runnable binaries
        if: github.event.inputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          APP_INPUT="${{ github.event.inputs.app || 'all' }}"
          args=(cargo run -p xtask -- package build)
          if [[ "$APP_INPUT" == "all" ]]; then
            args+=(--all-apps)
          else
            args+=(--app "$APP_INPUT")
          fi
          "${args[@]}"

      - name: Stage raw runnable binaries
        if: github.event.inputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          APP_INPUT="${{ github.event.inputs.app || 'all' }}"
          platform="${{ matrix.platform }}"
          version="${{ steps.package-channel.outputs.version }}"
          ext=""
          if [[ "$platform" == "windows" ]]; then
            ext=".exe"
          fi

          if [[ "$APP_INPUT" == "all" ]]; then
            apps=(liora-gallery liora-docs)
          elif [[ "$APP_INPUT" == "gallery" ]]; then
            apps=(liora-gallery)
          else
            apps=(liora-docs)
          fi

          out_root="target/liora-raw-binaries"
          rm -rf "$out_root"
          mkdir -p "$out_root"
          checksum_file="$out_root/checksums.txt"
          : > "$checksum_file"

          sha256() {
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$1" | awk '{print $1}'
            else
              shasum -a 256 "$1" | awk '{print $1}'
            fi
          }

          for app in "${apps[@]}"; do
            src="target/release/${app}${ext}"
            if [[ ! -f "$src" ]]; then
              echo "missing raw runnable binary: $src" >&2
              exit 1
            fi
            dest_dir="$out_root/$app/$platform"
            mkdir -p "$dest_dir"
            dest="$dest_dir/${app}${ext}"
            cp "$src" "$dest"
            digest="$(sha256 "$dest")"
            rel="${dest#${out_root}/}"
            printf '%s  %s\n' "$digest" "$rel" >> "$checksum_file"
          done

          cat > "$out_root/README.md" <<EOF
          # Liora raw runnable binaries

          Version: \`$version\`
          Platform: \`$platform\`

          These are the original release-mode executables built before installer packaging.
          They are uploaded for Liora's own release verification and smoke-test workflow; downstream Liora component-library users do not need to publish raw binaries unless their product release policy requires it.
          EOF
          sed -i.bak 's/^          //' "$out_root/README.md" && rm "$out_root/README.md.bak"

      - name: Build gallery package command
        id: package-command
        if: github.event.inputs.app != 'docs'
        shell: bash
        run: |
          set -euo pipefail
          DRY_INPUT="${{ github.event.inputs.dry_run || 'false' }}"
          format="platform-defaults"
          if [[ "${{ matrix.platform }}" == "windows" && "${{ steps.package-channel.outputs.channel }}" == "preview" && "$DRY_INPUT" != "true" ]]; then
            # MSI requires a numeric-only Windows Installer version. Keep push previews real by
            # building the NSIS package; tagged release builds still use the full Windows default set.
            format="nsis"
          fi
          args=(cargo run -p xtask -- package ci --app gallery --format "$format" --skip-build)
          if [[ "$DRY_INPUT" == "true" ]]; then
            args+=(--dry-run)
          fi
          printf 'command=' >> "$GITHUB_OUTPUT"
          printf '%q ' "${args[@]}" >> "$GITHUB_OUTPUT"
          printf '\n' >> "$GITHUB_OUTPUT"

      - name: Package Gallery installers
        if: github.event.inputs.app != 'docs'
        shell: bash
        run: ${{ steps.package-command.outputs.command }}

      - name: Smoke Gallery package artifacts
        if: github.event.inputs.dry_run != 'true' && github.event.inputs.app != 'docs'
        shell: bash
        run: |
          set -euo pipefail
          format="platform-defaults"
          if [[ "${{ matrix.platform }}" == "windows" && "${{ steps.package-channel.outputs.channel }}" == "preview" ]]; then
            format="nsis"
          fi
          cargo run -p xtask -- package smoke --app gallery --format "$format"

      - name: Plan Gallery install and uninstall smoke
        if: github.event.inputs.dry_run != 'true' && github.event.inputs.app != 'docs'
        shell: bash
        run: |
          set -euo pipefail
          format="platform-defaults"
          if [[ "${{ matrix.platform }}" == "windows" && "${{ steps.package-channel.outputs.channel }}" == "preview" ]]; then
            format="nsis"
          fi
          cargo run -p xtask -- package install-smoke --app gallery --format "$format"

      - name: Upload raw runnable binaries
        if: github.event.inputs.dry_run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: liora-${{ steps.package-channel.outputs.channel }}-binaries-${{ matrix.platform }}
          path: target/liora-raw-binaries/**
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 90 || 14 }}

      - name: Upload Gallery package artifacts
        if: github.event.inputs.dry_run != 'true' && github.event.inputs.app != 'docs'
        uses: actions/upload-artifact@v4
        with:
          name: liora-${{ steps.package-channel.outputs.channel }}-gallery-packages-${{ matrix.platform }}
          path: |
            target/packages/**
            target/liora-packager/*.toml
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 90 || 14 }}

  release:
    name: Publish GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: liora-release-gallery-packages-*
          path: dist
          merge-multiple: false

      - name: Download raw runnable binaries
        uses: actions/download-artifact@v4
        with:
          pattern: liora-release-binaries-*
          path: dist
          merge-multiple: false

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release-assets
          mkdir -p release-assets
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          asset_index="release-asset-index.tsv"
          : > "$asset_index"

          short_platform() {
            case "$1" in
              linux) echo "linux-x64" ;;
              macos) echo "macos-arm64" ;;
              windows) echo "windows-x64" ;;
              *) echo "$1" ;;
            esac
          }

          sha256() {
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$1" | awk '{print $1}'
            else
              shasum -a 256 "$1" | awk '{print $1}'
            fi
          }

          add_asset() {
            local src="$1" dest="$2" kind="$3" platform="$4" notes="$5"
            if [[ ! -f "$src" ]]; then
              echo "missing release source: $src" >&2
              exit 1
            fi
            cp "$src" "release-assets/$dest"
            printf '%s\t%s\t%s\t%s\n' "$kind" "$platform" "$dest" "$notes" >> "$asset_index"
          }

          # Raw runnable executables: Docs and Gallery for every platform.
          for platform in linux macos windows; do
            suffix="$(short_platform "$platform")"
            ext=""
            [[ "$platform" == "windows" ]] && ext=".exe"
            for app in liora-docs liora-gallery; do
              src="dist/liora-release-binaries-${platform}/${app}/${platform}/${app}${ext}"
              if [[ -f "$src" ]]; then
                add_asset "$src" "${app}-${tag}-${suffix}${ext}" \
                  "Raw executable" "$platform" "Directly runnable ${app} binary."
              fi
            done
          done

          # Gallery installer/package artifacts only. Do not upload generated .md notes,
          # backend TOML configs, package manifests, or portable staging internals.
          while IFS= read -r artifact; do
            name="$(basename "$artifact")"
            case "$artifact" in
              */portable-staging/*|*.md|*.toml|*.json|*/checksums.txt) continue ;;
            esac
            case "$name" in
              *.AppImage)
                add_asset "$artifact" "liora-gallery-${tag}-linux-x64.AppImage" \
                  "Gallery installer" "linux" "Portable AppImage for Linux desktops."
                ;;
              *.deb)
                add_asset "$artifact" "liora-gallery-${tag}-linux-x64.deb" \
                  "Gallery installer" "linux" "Debian/Ubuntu package."
                ;;
              *.rpm)
                add_asset "$artifact" "liora-gallery-${tag}-linux-x64.rpm" \
                  "Gallery installer" "linux" "RPM package for Fedora/RHEL/openSUSE-family systems."
                ;;
              *.tar.gz)
                add_asset "$artifact" "liora-gallery-${tag}-linux-x64.tar.gz" \
                  "Gallery installer" "linux" "Portable unpack-and-run archive with launcher and desktop metadata."
                ;;
              *.dmg)
                add_asset "$artifact" "liora-gallery-${tag}-macos-arm64.dmg" \
                  "Gallery installer" "macos" "macOS Apple Silicon disk image."
                ;;
              *setup.exe)
                add_asset "$artifact" "liora-gallery-${tag}-windows-x64-setup.exe" \
                  "Gallery installer" "windows" "Windows NSIS setup installer."
                ;;
              *.msi)
                add_asset "$artifact" "liora-gallery-${tag}-windows-x64.msi" \
                  "Gallery installer" "windows" "Windows MSI installer package."
                ;;
            esac
          done < <(find dist/liora-release-gallery-packages-* -type f | sort)

          if [[ ! -s "$asset_index" ]]; then
            echo "No distributable release assets were selected from dist/." >&2
            find dist -type f | sort >&2 || true
            exit 1
          fi

          : > release-assets/SHA256SUMS.txt
          while IFS= read -r file; do
            name="${file#release-assets/}"
            printf '%s  %s\n' "$(sha256 "$file")" "$name" >> release-assets/SHA256SUMS.txt
          done < <(find release-assets -type f ! -name SHA256SUMS.txt | sort)
          printf 'Checksum\tall\tSHA256SUMS.txt\tSHA-256 checksums for all uploaded distributable assets.\n' >> "$asset_index"

          echo "Selected release assets:"
          cut -f3 "$asset_index"
      - name: Build release notes and changelog
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          git fetch --tags --force
          previous_tag="$(git tag --sort=-v:refname | grep -v "^${tag}$" | head -n 1 || true)"

          changelog_input="changelog.tsv"
          if [[ -n "${previous_tag}" ]]; then
            git log --pretty=format:'%s%x09%h%x09%cs' "${previous_tag}..${tag}" > "${changelog_input}" || true
          else
            git log --pretty=format:'%s%x09%h%x09%cs' "${tag}" --max-count=100 > "${changelog_input}" || true
          fi

          emit_grouped_changelog() {
            local input="$1"
            local wanted subject sha date type scope title
            local conventional_commit_pattern='^([A-Za-z]+)(\(([^)]*)\))?(!)?:[[:space:]]*(.*)$'
            local order=(feat fix docs ci build refactor perf test style chore revert other)
            declare -A headings=(
              [feat]="Added"
              [fix]="Fixed"
              [docs]="Documentation"
              [ci]="CI"
              [build]="Build"
              [refactor]="Changed"
              [perf]="Performance"
              [test]="Tests"
              [style]="Style"
              [chore]="Maintenance"
              [revert]="Reverts"
              [other]="Changed"
            )

            for wanted in "${order[@]}"; do
              local lines=()
              while IFS=$'	' read -r subject sha date; do
                [[ -z "${subject}" ]] && continue
                type="other"
                scope=""
                title="${subject}"
                if [[ "${subject}" =~ ${conventional_commit_pattern} ]]; then
                  type="${BASH_REMATCH[1],,}"
                  scope="${BASH_REMATCH[3]}"
                  title="${BASH_REMATCH[5]}"
                fi
                case "${type}" in
                  feature|features) type="feat" ;;
                  fixes) type="fix" ;;
                  doc) type="docs" ;;
                  tests) type="test" ;;
                esac
                case "${type}" in
                  feat|fix|docs|ci|build|refactor|perf|test|style|chore|revert) ;;
                  *) type="other" ;;
                esac
                if [[ "${type}" == "${wanted}" ]]; then
                  if [[ -n "${scope}" ]]; then
                    lines+=("- **${scope}:** ${title} (\`${sha}\`)")
                  else
                    lines+=("- ${title} (\`${sha}\`)")
                  fi
                fi
              done < "${input}"
              if [[ ${#lines[@]} -gt 0 ]]; then
                echo "## ${headings[$wanted]}"
                echo
                printf '%s\n' "${lines[@]}"
                echo
              fi
            done
          }

          emit_download_table() {
            echo "## Downloads"
            echo
            echo "| Type | Platform | Asset | Notes |"
            echo "| --- | --- | --- | --- |"
            if [[ -s release-asset-index.tsv ]]; then
              while IFS=$'\t' read -r kind platform asset notes; do
                [[ -z "${asset}" ]] && continue
                case "$platform" in
                  linux) label="Linux x64" ;;
                  macos) label="macOS arm64" ;;
                  windows) label="Windows x64" ;;
                  all) label="All platforms" ;;
                  *) label="$platform" ;;
                esac
                echo "| ${kind} | ${label} | \`${asset}\` | ${notes} |"
              done < release-asset-index.tsv
            else
              echo "| Release assets | All platforms | See attached files | Asset index was not generated. |"
            fi
            echo
            echo "Only distributable binaries, installers, portable archives, and one checksum file are uploaded. Generated CI notes, backend TOML configs, package manifests, and staging internals stay in Actions artifacts rather than GitHub Release assets."
            echo
          }

          emit_commit_audit() {
            echo "## Commit audit"
            echo
            if [[ -n "${previous_tag}" ]]; then
              echo "Release range: \`${previous_tag} → ${tag}\`."
            else
              echo "No previous tag was found; listing up to 100 commits reachable from \`${tag}\`."
            fi
            echo
            if [[ -s "${changelog_input}" ]]; then
              while IFS=$'	' read -r subject sha date; do
                [[ -z "${subject}" ]] && continue
                echo "- \`${sha}\` ${date} — ${subject}"
              done < "${changelog_input}"
            else
              echo "- No commits found in this release range."
            fi
            echo
          }

          asset_count="$(find release-assets -type f | wc -l | tr -d ' ')"
          checksum_count="$(find release-assets -type f -name 'SHA256SUMS.txt' | wc -l | tr -d ' ')"

          {
            echo "# Liora ${version} — Native GPUI SDK & Apps"
            echo
            echo "### Codename: Aurora"
            echo
            echo "This release ships the one-dependency Liora SDK facade, lower-level SDK crates, cross-platform runnable Docs/Gallery binaries, and Gallery installer packages from the automated release pipeline."
            echo
            echo "## Highlights"
            echo
            echo "- **SDK crates** — \`liora\` is the one-stop facade; \`liora-theme\`, \`liora-core\`, \`liora-icons\`, \`liora-icons-lucide\`, \`liora-components\`, \`liora-tray\`, and \`liora-packager\` remain available for focused integrations."
            echo "- **Docs app** — Cross-platform raw runnable executables are attached for Linux, macOS, and Windows."
            echo "- **Gallery app** — Cross-platform raw runnable executables plus native Gallery installer bundles are attached from the packaging workflow."
            echo "- **Release automation** — Assets, checksums, grouped changelog, verification notes, and commit audit are generated by GitHub Actions."
            echo
            echo "> Download the matching executable or installer bundle from the assets attached below. Use artifacts from the same tag together."
            echo
            emit_download_table
            echo "## SDK crates"
            echo
            echo "| Crate | Version | Install |"
            echo "| --- | --- | --- |"
            for crate in liora liora-theme liora-core liora-icons liora-icons-lucide liora-components liora-tray liora-packager; do
              echo "| \`${crate}\` | \`${version}\` | \`cargo add ${crate}\` |"
            done
            echo
            echo "## Added"
            echo
            echo "- One-dependency \`liora\` SDK facade plus dependency-ordered crates.io publishing for all public Liora crates."
            echo "- Cross-platform raw executable assets for both Liora Docs and Liora Gallery."
            echo "- Gallery installer package assets for the platform default installer formats."
            echo
            emit_grouped_changelog "${changelog_input}"
            echo "## Upgrade notes"
            echo
            if [[ -n "${previous_tag}" ]]; then
              echo "- Release range: \`${previous_tag} → ${tag}\`."
            else
              echo "- First tagged release in this repository history."
            fi
            echo "- SDK consumers can start with \`cargo add liora\`; lower-level crates are published for token/theme/icon/tray/packaging-focused integrations."
            echo "- \`liora-docs\` is distributed as a raw executable; \`liora-gallery\` includes both raw executables and installer bundles."
            echo "- macOS/Windows artifacts are unsigned unless the repository release environment provides signing/notarization secrets and sets \`LIORA_REQUIRE_SIGNING=true\`."
            echo
            echo "## Verification"
            echo
            echo "- \`cargo fmt --all --check\`"
            echo "- \`cargo check --workspace --all-targets\`"
            echo "- \`cargo test --workspace\`"
            echo "- \`cargo check -p liora-docs --bin check_snippets\`"
            echo "- \`cargo doc --workspace --no-deps\`"
            echo "- \`cargo run -p xtask -- package release-readiness\`"
            echo "- Gallery package dry-run and install-smoke dry-run in CI."
            echo "- Release asset count: \`${asset_count}\`; checksum files discovered: \`${checksum_count}\`."
            echo
            emit_commit_audit
          } > release-notes.md

          cat release-notes.md

      - name: Publish release and upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mapfile -t files < <(find release-assets -type f | sort)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No files found under dist; refusing to publish an empty release." >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "Liora ${tag}" \
              --notes-file release-notes.md
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" \
              --title "Liora ${tag}" \
              --notes-file release-notes.md
          fi
