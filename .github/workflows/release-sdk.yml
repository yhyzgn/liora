name: Publish Liora crates.io utility crates

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish crates.io utility crates after package verification"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CRATES_IO_CRATES: "liora-packager liora-updater"

jobs:
  package-utility-crates:
    name: Package crates.io utility crates
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Prefer toolchain cargo shim
        shell: bash
        run: echo "$(dirname "$(rustup which cargo)")" >> "$GITHUB_PATH"

      - name: Audit git-only GPUI SDK and crates.io utility metadata
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import tomllib

          root_manifest = Path("Cargo.toml").read_text()
          assert "[patch.crates-io]" not in root_manifest, "workspace must not patch crates.io GPUI packages"
          assert "[patch.\"https://github.com/zed-industries/zed\"]" not in root_manifest, "workspace must not force local Zed GPUI patches"
          root = tomllib.loads(root_manifest)
          gpui_dep = root["workspace"]["dependencies"]["gpui"]
          gpui_platform_dep = root["workspace"]["dependencies"]["gpui_platform"]
          for dep_name, dep in [("gpui", gpui_dep), ("gpui_platform", gpui_platform_dep)]:
              assert dep["git"] == "https://github.com/zed-industries/zed", dep_name
              assert dep["rev"], f"{dep_name} must be pinned by rev"
              assert "version" not in dep, f"{dep_name} must not fall back to crates.io"
              assert dep["default-features"] is False, dep_name

          git_only = [
              "liora",
              "liora-theme",
              "liora-core",
              "liora-icons",
              "liora-icons-lucide",
              "liora-components",
              "liora-tray",
          ]
          crates_io = ["liora-packager", "liora-updater"]
          for crate in git_only:
              path = Path("crates") / crate / "Cargo.toml"
              package = tomllib.loads(path.read_text())["package"]
              assert package["publish"] is False, f"{crate} is GPUI-git-only and must not publish to crates.io"
              assert package["repository"] == "https://github.com/yhyzgn/liora"
              assert package.get("description")

          for crate in crates_io:
              path = Path("crates") / crate / "Cargo.toml"
              package = tomllib.loads(path.read_text())["package"]
              assert package["publish"] is True, f"{crate} should remain crates.io publishable"
              assert package["license-file"] == "../../LICENSE.md"
              assert package["repository"] == "https://github.com/yhyzgn/liora"
              assert package.get("description")
          print("Git-only GPUI SDK and crates.io utility metadata OK")
          PY

      - name: Package crates.io utility crates
        shell: bash
        run: |
          set -euo pipefail
          cargo package -p liora-packager
          cargo package -p liora-updater

      - name: Upload utility crate preflight artifact
        uses: actions/upload-artifact@v7
        with:
          name: liora-crates-io-utility-preflight
          path: |
            target/package/liora-packager-*.crate
            target/package/liora-updater-*.crate
          if-no-files-found: error
          retention-days: 30

  publish-utility-crates:
    name: Publish crates.io utility crates
    needs: package-utility-crates
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true'
    runs-on: ubuntu-24.04
    environment: crates-io

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Prefer toolchain cargo shim
        shell: bash
        run: echo "$(dirname "$(rustup which cargo)")" >> "$GITHUB_PATH"

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "CRATES_IO_TOKEN is required to publish crates.io utility crates." >&2
            exit 1
          fi

          crate_version() {
            sed -n '/^\[package\]/,/^\[/ s/^version = "\(.*\)"/\1/p' "$1/Cargo.toml" | head -n 1
          }

          crate_dir() {
            case "$1" in
              liora-packager) echo "crates/liora-packager" ;;
              liora-updater) echo "crates/liora-updater" ;;
              *) echo "unknown crates.io utility crate: $1" >&2; exit 1 ;;
            esac
          }

          crate_exists() {
            local crate="$1"
            local version="$2"
            local status
            status="$(curl -sS -A "liora-release-sdk/${GITHUB_RUN_ID:-local} (https://github.com/yhyzgn/liora)" -o /dev/null -w '%{http_code}' "https://crates.io/api/v1/crates/${crate}/${version}")"
            [[ "$status" == "200" ]]
          }

          for crate in $CRATES_IO_CRATES; do
            dir="$(crate_dir "$crate")"
            version="$(crate_version "$dir")"
            if [[ -z "$version" ]]; then
              echo "Failed to read version for ${crate}" >&2
              exit 1
            fi

            if crate_exists "$crate" "$version"; then
              echo "Skipping ${crate} ${version}: already published."
              continue
            fi

            echo "Publishing ${crate} ${version}..."
            cargo publish -p "$crate"
          done
