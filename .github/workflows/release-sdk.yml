name: Publish Liora crates.io SDK crates

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish crates.io SDK crates after package and patched-consumer verification"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CRATES_IO_CRATES: "liora-theme liora-core liora-icons liora-icons-lucide liora-components liora-tray liora-packager liora-updater liora"
  ZED_GPUI_REV: "2c346f60a76fe3f0367ef924927f50a6efdf5718"

jobs:
  package-sdk-crates:
    name: Package and verify crates.io SDK crates
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux GPUI dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgtk-3-dev \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            pkg-config \
            vulkan-tools

      - name: Prefer toolchain cargo shim
        shell: bash
        run: echo "$(dirname "$(rustup which cargo)")" >> "$GITHUB_PATH"

      - name: Audit crates.io SDK metadata
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import tomllib

          root_manifest = Path("Cargo.toml").read_text()
          assert "[patch.crates-io]" not in root_manifest, "workspace must not force crates.io patches"
          assert "[patch.\"https://github.com/zed-industries/zed\"]" not in root_manifest, "workspace must not force local Zed GPUI patches"
          root = tomllib.loads(root_manifest)
          gpui_dep = root["workspace"]["dependencies"]["gpui"]
          assert gpui_dep["version"] == "0.2.2", "published packages need Cargo's registry fallback for gpui"
          assert gpui_dep["git"] == "https://github.com/zed-industries/zed"
          assert gpui_dep["rev"], "gpui must be pinned by official Zed rev for local development"
          assert gpui_dep["default-features"] is False

          gpui_platform_dep = root["workspace"]["dependencies"]["gpui_platform"]
          assert gpui_platform_dep["git"] == "https://github.com/zed-industries/zed"
          assert "version" not in gpui_platform_dep, "gpui_platform is app-only and not published on crates.io"
          assert gpui_platform_dep["rev"] == gpui_dep["rev"]
          assert gpui_platform_dep["default-features"] is False

          crates = "liora-theme liora-core liora-icons liora-icons-lucide liora-components liora-tray liora-packager liora-updater liora".split()
          for crate in crates:
              path = Path("crates") / crate / "Cargo.toml"
              package = tomllib.loads(path.read_text())["package"]
              assert package["publish"] is True, f"{crate} should be publishable to crates.io"
              assert package["license-file"] == "../../LICENSE.md"
              assert package["repository"] == "https://github.com/yhyzgn/liora"
              assert package.get("description")
          print("crates.io SDK metadata OK")
          PY

      - name: Package independently publishable crates
        shell: bash
        run: |
          set -euo pipefail
          # Crates that depend on unpublished sibling versions are validated by
          # the patched consumer smoke test below and published sequentially in
          # the publish job after each dependency appears in the registry index.
          for crate in liora-theme liora-tray liora-packager liora-updater; do
            cargo package -p "$crate" --no-verify
          done

      - name: Verify patched crates.io consumer
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          cat > "$tmp/Cargo.toml" <<EOF
          [package]
          name = "liora-crates-io-consumer-smoke"
          version = "0.0.0"
          edition = "2024"
          publish = false

          [dependencies]
          gpui = { version = "0.2.2", default-features = false }
          liora = { path = "$PWD/crates/liora", default-features = true }

          [patch.crates-io]
          gpui = { git = "https://github.com/zed-industries/zed", rev = "$ZED_GPUI_REV" }
          EOF
          mkdir -p "$tmp/src"
          cat > "$tmp/src/main.rs" <<'EOF'
          use liora::{ThemeMode, components::Button, init_liora_with_mode};

          fn main() {
              let _ = ThemeMode::System;
              let _ = Button::new("Smoke");
              let _init: fn(&mut gpui::App, ThemeMode) = init_liora_with_mode;
          }
          EOF
          cargo check --manifest-path "$tmp/Cargo.toml"

      - name: Upload SDK crate preflight artifacts
        uses: actions/upload-artifact@v7
        with:
          name: liora-crates-io-sdk-preflight
          path: target/package/liora-*.crate
          if-no-files-found: error
          retention-days: 30

  publish-sdk-crates:
    name: Publish crates.io SDK crates
    needs: package-sdk-crates
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true'
    runs-on: ubuntu-24.04
    environment: crates-io

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Prefer toolchain cargo shim
        shell: bash
        run: echo "$(dirname "$(rustup which cargo)")" >> "$GITHUB_PATH"

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "CRATES_IO_TOKEN is required to publish crates.io SDK crates." >&2
            exit 1
          fi

          crate_version() {
            sed -n '/^\[package\]/,/^\[/ s/^version = "\(.*\)"/\1/p' "$1/Cargo.toml" | head -n 1
          }

          crate_dir() {
            case "$1" in
              liora-theme) echo "crates/liora-theme" ;;
              liora-core) echo "crates/liora-core" ;;
              liora-icons) echo "crates/liora-icons" ;;
              liora-icons-lucide) echo "crates/liora-icons-lucide" ;;
              liora-components) echo "crates/liora-components" ;;
              liora-tray) echo "crates/liora-tray" ;;
              liora-packager) echo "crates/liora-packager" ;;
              liora-updater) echo "crates/liora-updater" ;;
              liora) echo "crates/liora" ;;
              *) echo "unknown crates.io SDK crate: $1" >&2; exit 1 ;;
            esac
          }

          crate_exists() {
            local crate="$1"
            local version="$2"
            local status
            status="$(curl -sS -A "liora-release-sdk/${GITHUB_RUN_ID:-local} (https://github.com/yhyzgn/liora)" -o /dev/null -w '%{http_code}' "https://crates.io/api/v1/crates/${crate}/${version}")"
            [[ "$status" == "200" ]]
          }

          wait_for_crate() {
            local crate="$1"
            local version="$2"
            for attempt in {1..30}; do
              if crate_exists "$crate" "$version"; then
                return 0
              fi
              echo "Waiting for ${crate} ${version} to appear in crates.io index (${attempt}/30)..."
              sleep 10
            done
            echo "Timed out waiting for ${crate} ${version} to appear in crates.io." >&2
            return 1
          }

          for crate in $CRATES_IO_CRATES; do
            dir="$(crate_dir "$crate")"
            version="$(crate_version "$dir")"
            if [[ -z "$version" ]]; then
              echo "Failed to read version for ${crate}" >&2
              exit 1
            fi

            if crate_exists "$crate" "$version"; then
              echo "Skipping ${crate} ${version}: already published."
              continue
            fi

            echo "Publishing ${crate} ${version}..."
            cargo publish -p "$crate" --no-verify
            wait_for_crate "$crate" "$version"
          done
