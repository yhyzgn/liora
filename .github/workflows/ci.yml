name: Liora quality gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read


jobs:
  rust-quality:
    name: fmt, check, test, docs snippets
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Prefer toolchain cargo shim
        shell: bash
        run: echo "$(dirname "$(rustup which cargo)")" >> "$GITHUB_PATH"

      - name: Install Linux native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libasound2-dev \
            libatk1.0-dev \
            libayatana-appindicator3-dev \
            libcairo2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgdk-pixbuf-2.0-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libpango1.0-dev \
            librsvg2-dev \
            libvulkan-dev \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            pkg-config

      - name: Format check
        run: cargo fmt --all --check

      - name: Workspace check
        run: cargo check --workspace --all-targets

      - name: Workspace tests
        run: cargo test --workspace

      - name: Docs snippet check
        run: cargo check -p liora-docs --bin check_snippets

      - name: SDK rustdoc coverage
        shell: bash
        run: |
          set -euo pipefail
          sdk_crates=(
            liora
            liora-core
            liora-theme
            liora-icons
            liora-icons-lucide
            liora-icons-antd
            liora-icons-ionic
            liora-icons-tabler
            liora-icons-carbon
            liora-icons-material
            liora-components
            liora-tray
            liora-updater
            liora-packager
          )
          for crate in "${sdk_crates[@]}"; do
            RUSTDOCFLAGS="-D missing_docs" cargo doc -p "$crate" --no-deps
          done

  packaging-dry-run:
    name: packaging validate and dry-run
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Prefer toolchain cargo shim
        shell: bash
        run: echo "$(dirname "$(rustup which cargo)")" >> "$GITHUB_PATH"

      - name: Install packaging dry-run tools
        run: |
          sudo apt-get update
          sudo apt-get install -y file

      - name: Packaging metadata validate
        run: cargo run -p xtask -- package validate

      - name: Release readiness dry-run policy check
        run: cargo run -p xtask -- package release-readiness

      - name: Packaging dry-run
        run: cargo run -p xtask -- package ci --app gallery --format platform-defaults --dry-run --skip-build

      - name: Install/uninstall smoke dry-run
        run: cargo run -p xtask -- package install-smoke --app gallery --format platform-defaults --dry-run
